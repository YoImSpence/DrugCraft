name: DrugCraft
version: 1.0.0
main: com.spence.drugcraft.DrugCraft
api-version: 1.21
depend:
  - Vault
  - Citizens
  - DecentHolograms
  - NBTAPI
  - LuckPerms
  - Essentials
commands:
  drugadmin:
    description: Admin command for DrugCraft
    usage: /<command> [clearcrops|spawnpolice]
    permission: drugcraft.admin
  cartel:
    description: Manage cartels
    usage: /<command> <create|invite|join|leave|info|manage>
    permission: drugcraft.cartel
permissions:
  drugcraft.admin:
    description: Allows access to admin commands
    default: op
  drugcraft.use:
    description: Allows use of drugs
    default: true
  drugcraft.bypass.police:
    description: Bypasses police detection
    default: false
  drugcraft.cartel:
    description: Allows cartel management
    default: true
  drugcraft.cartel.harvest:
    description: Allows harvesting cartel crops
    default: false
  drugcraft.cartel.plant:
    description: Allows planting cartel crops
    default: false
  drugcraft.cartel.stash:
    description: Allows accessing cartel stashes
    default: false